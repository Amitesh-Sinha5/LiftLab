<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Rep Max Calculator</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background-color: #1e1e1e;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
      margin-top: 30px;
      margin-bottom: 30px;
      max-width: 700px;
    }
    h1 {
      color: #bb86fc;
      margin-bottom: 25px;
      font-weight: 600;
      border-bottom: 2px solid #bb86fc;
      padding-bottom: 15px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .alert {
      margin-top: 20px;
      text-align: center;
      background-color: #2d2d2d;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
    }
    .alert h4 {
      color: #bb86fc;
      font-weight: bold;
    }
    .alert p {
      font-size: 1.2rem;
      margin: 10px 0;
    }
    .alert .result {
      font-size: 1.5rem;
      font-weight: 600;
      color: #76e7b4;
    }
    .alert .value {
      color: #bb86fc;
    }
    .btn-back {
      background-color: #444;
      border-color: #555;
      color: #e0e0e0;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-back:hover {
      background-color: #555;
      border-color: #666;
      transform: translateY(-2px);
      color: #e0e0e0;
    }
  </style>
</head>
<body>
<div class="container">
  <a th:href="@{/}" class="btn btn-back">Back</a>
  <h1>One Rep Max Calculator</h1>
  <form action="/onerepmax" method="post">
    <div class="form-group">
      <label for="weight">Weight Lifted (kg):</label>
      <input type="number" id="weight" name="weight" class="form-control" th:value="${oneRepMax.weight}" required>
    </div>
    <div class="form-group">
      <label for="reps">Reps Completed:</label>
      <input type="number" id="reps" name="reps" class="form-control" th:value="${oneRepMax.reps}" required>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Calculate</button>
  </form>

  <!-- Display the result after submission -->
  <div th:if="${oneRepMax.oneRepMax}" class="alert mt-4" role="alert">
    <h4>One Rep Max Estimate</h4>
    <p>Your input details:</p>
    <p><strong>Weight Lifted:</strong> <span th:text="${oneRepMax.weight}"></span> kg</p>
    <p><strong>Reps Completed:</strong> <span th:text="${oneRepMax.reps}"></span></p>
    <p class="result">Your Estimated One Rep Max is: <span class="value" th:text="${oneRepMax.oneRepMax}"></span> kg</p>
  </div>
</div>
</body>
</html>
