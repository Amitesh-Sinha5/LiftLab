<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout App</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background-color: #1e1e1e;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            margin-top: 30px;
            margin-bottom: 30px;
            max-width: 700px;
        }
        h1 {
            color: #bb86fc;
            margin-bottom: 25px;
            font-weight: 600;
            border-bottom: 2px solid #bb86fc;
            padding-bottom: 15px;
            text-align: center;
        }
        .list-group-item {
            background-color: #2d2d2d;
            color: #e0e0e0;
            border: 1px solid #444;
            margin-bottom: 8px;
            border-radius: 6px !important;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            padding: 12px 20px;
        }
        .list-group-item:hover {
            background-color: #3d3d3d;
            color: #bb86fc;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .list-group-item:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Welcome to LiftLab</h1>
    <div class="list-group">
        <a th:href="@{/workouts}" class="list-group-item list-group-item-action">Manage Workouts</a>
        <a th:href="@{/exercises}" class="list-group-item list-group-item-action">Manage Exercises</a>
        <a th:href="@{/progress}" class="list-group-item list-group-item-action">View Progress</a>
        <a th:href="@{/workouts/logs}" class="list-group-item list-group-item-action">Workout Logs</a>
        <a th:href="@{/goals}" class="list-group-item list-group-item-action">Manage Goals</a>
        <a th:href="@{/bmi}" class="list-group-item list-group-item-action">Calculate BMI</a> <!-- NEW -->
        <a th:href="@{/onerepmax}" class="list-group-item list-group-item-action">One Rep Max Calculator</a> <!-- NEW -->
    </div>
</div>
</body>
</html>
